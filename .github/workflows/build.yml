name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.17
        check-latest: true

    - name: Build
      run: go build
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v3.0.0
      with:
        name: autoinstall
        path: ./autoinstall
